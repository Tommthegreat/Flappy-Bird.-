<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Full Online</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#70c5ce;
overflow:hidden;
text-align:center;
}

canvas{
display:block;
background:#70c5ce;
touch-action:manipulation;
}

button{
padding:10px;
margin:5px;
font-size:14px;
}

/* MENU BOX */
.box{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:15px;
width:340px;
max-height:70vh;
overflow-y:auto;
border:2px solid black;
z-index:9999;
}

.skin{
display:inline-block;
padding:8px;
margin:5px;
border:1px solid black;
cursor:pointer;
}
</style>
</head>

<body>

<div id="home">
<h2>🐦 FLAPPY FULL ONLINE</h2>

<p>👤 Username: <span id="myId"></span></p>

<button onclick="startGame()">▶ Start</button>
<button onclick="openFriends()">👥 Friends</button>
<button onclick="openAddFriend()">➕ Add Friend</button>
<button onclick="openSkin()">🧥 Skins</button>
<button onclick="openMail()">📩 Mail</button>
<button onclick="openLB()">🏆 Leaderboard</button>
</div>

<p>Score: <span id="score">0</span></p>
<p>Coins: <span id="coins">0</span></p>
<p>Total: <span id="total">0</span></p>

<canvas id="game"></canvas>

<!-- FRIENDS -->
<div id="friendsBox" class="box">
<h3>👥 Friends</h3>
<div id="friendsList"></div>
<button onclick="closeFriends()">Close</button>
</div>

<!-- ADD FRIEND -->
<div id="addFriendBox" class="box">
<h3>➕ Add Friend</h3>
<input id="friendIdInput" placeholder="Username">
<br><br>
<button onclick="sendFriendRequest()">Send</button>
<button onclick="closeAddFriend()">Close</button>
</div>

<!-- SKINS -->
<div id="skinBox" class="box">
<h3>🧥 Skins</h3>
<div class="skin" onclick="setSkin('yellow')">🟡</div>
<div class="skin" onclick="setSkin('red')">🔴</div>
<div class="skin" onclick="setSkin('blue')">🔵</div>
<button onclick="closeSkin()">Close</button>
</div>

<!-- MAIL -->
<div id="mailBox" class="box">
<h3>📩 Mail</h3>
<div id="mailList"></div>
<button onclick="closeMail()">Close</button>
</div>

<!-- LEADERBOARD -->
<div id="lbBox" class="box">
<h3>🏆 Leaderboard</h3>

<div style="display:flex;">
<div style="width:50%;border-right:1px solid #ccc;">
<h4>🪙 Coins</h4>
<div id="coinLB"></div>
</div>

<div style="width:50%;">
<h4>⭐ Total</h4>
<div id="scoreLB"></div>
</div>
</div>

<button onclick="closeLB()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
doc,setDoc,
collection,
addDoc,
onSnapshot,
getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ================= USERNAME SYSTEM ================= */

let username = localStorage.getItem("username");

async function initUser(name){

document.getElementById("myId").innerText = name;

onSnapshot(doc(db,"users",name),(snap)=>{
let data = snap.data();
if(data){
coins = data.coins || 0;
total = data.total || 0;
friends = data.friends || [];
}
});
}

async function createUser(){

let name = prompt("Enter unique username:");

if(!name){
location.reload();
return;
}

const snap = await getDoc(doc(db,"users",name));

if(snap.exists()){
alert("Username already exists!");
location.reload();
return;
}

localStorage.setItem("username",name);

await setDoc(doc(db,"users",name),{
coins:0,
total:0,
friends:[]
});

initUser(name);
}

if(username){
initUser(username);
}else{
createUser();
}

/* ================= GAME ================= */

const c=document.getElementById("game");
const ctx=c.getContext("2d");

let y=200,v=0,g=0.55,running=false;
let score=0;
let pipes=[];
let coins=0;
let total=0;
let friends=[];
let skin="yellow";

window.startGame=function(){
home.style.display="none";
c.style.display="block";
resize();
y=200;v=0;score=0;pipes=[];
running=true;
loop();
};

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
window.addEventListener("resize",resize);

function loop(){
if(!running)return;

ctx.clearRect(0,0,c.width,c.height);

v+=g;
y+=v;

ctx.fillStyle=skin;
ctx.beginPath();
ctx.arc(80,y,15,0,Math.PI*2);
ctx.fill();

if(!pipes.length||pipes[pipes.length-1].x<c.width-200){
pipes.push({x:c.width,top:Math.random()*(c.height-170-120)+50,done:false});
}

for(let p of pipes){
p.x-=3;

ctx.fillStyle="green";
ctx.fillRect(p.x,0,60,p.top);
ctx.fillRect(p.x,p.top+170,60,c.height);

if(80>p.x&&80<p.x+60&&(y<p.top||y>p.top+170)){
gameOver();
}

if(!p.done&&p.x+60<80){
p.done=true;
score++;
coins++;
total++;
}
}

pipes=pipes.filter(p=>p.x>-100);

if(y>c.height||y<0)gameOver();

document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("total").innerText=total;

requestAnimationFrame(loop);
}

/* TOUCH FIX */
function flap(){ if(running) v=-9; }
document.addEventListener("touchstart",flap,{passive:true});
document.addEventListener("click",flap);
document.addEventListener("mousedown",flap);

/* GAME OVER */
function gameOver(){
running=false;
localStorage.coins=coins;
localStorage.total=total;
setDoc(doc(db,"users",username),{coins,total},{merge:true});
home.style.display="block";
c.style.display="none";
}

/* FRIENDS */
window.openFriends=()=>friendsBox.style.display="block";
window.closeFriends=()=>friendsBox.style.display="none";

/* ADD FRIEND */
window.openAddFriend=()=>addFriendBox.style.display="block";
window.closeAddFriend=()=>addFriendBox.style.display="none";

window.sendFriendRequest=function(){
addDoc(collection(db,"mail"),{
from:username,
to:friendIdInput.value
});
};

/* MAIL */
window.openMail=()=>{mailBox.style.display="block";loadMail();}
window.closeMail=()=>mailBox.style.display="none";

function loadMail(){
onSnapshot(collection(db,"mail"),snap=>{
let html="";
snap.forEach(d=>{
let m=d.data();
if(m.to===username){
html+=`<p>📩 ${m.from}</p><hr>`;
}
});
mailList.innerHTML=html||"No mail";
});
}

/* SKINS */
window.openSkin=()=>skinBox.style.display="block";
window.closeSkin=()=>skinBox.style.display="none";
window.setSkin=(s)=>skin=s;

/* LEADERBOARD */
window.openLB=()=>{
lbBox.style.display="block";

onSnapshot(collection(db,"users"),snap=>{
let arr=[];
snap.forEach(d=>arr.push({...d.data(),id:d.id}));

arr=arr.slice(0,100);

let coinTop=[...arr].sort((a,b)=>b.coins-a.coins);
let scoreTop=[...arr].sort((a,b)=>b.total-a.total);

document.getElementById("coinLB").innerHTML=
coinTop.map((u,i)=>`<p>#${i+1} 👤 ${u.id}<br>🪙 ${u.coins}</p>`).join("");

document.getElementById("scoreLB").innerHTML=
scoreTop.map((u,i)=>`<p>#${i+1} 👤 ${u.id}<br>⭐ ${u.total}</p>`).join("");
});
};

window.closeLB=()=>lbBox.style.display="none";

</script>

</body>
</html>
